<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ConvNeXt-Tiny Thyroid Ultrasound Classifier</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, sans-serif; color-scheme: light; }
    body { margin: 0; background: #f4f7fb; color: #162033; }
    main { width: min(900px, calc(100% - 32px)); margin: 40px auto; }
    .card { background: white; border: 1px solid #dce3ee; border-radius: 18px; padding: 24px; box-shadow: 0 12px 40px rgba(36, 51, 78, .08); }
    h1 { margin: 0 0 8px; font-size: clamp(1.55rem, 4vw, 2.25rem); }
    .subtle { color: #5c6b82; margin-top: 0; }
    .upload { display: grid; gap: 14px; margin-top: 22px; }
    input, button { font: inherit; }
    input[type=file] { border: 1px dashed #9caac0; border-radius: 12px; padding: 16px; background: #f9fbfe; }
    button { border: 0; border-radius: 11px; padding: 12px 18px; background: #203d72; color: white; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .55; cursor: wait; }
    #preview { display: none; max-width: 100%; max-height: 390px; margin: 20px auto 0; border-radius: 12px; object-fit: contain; background: #0e1522; }
    #result { display: none; margin-top: 20px; border-radius: 14px; padding: 18px; background: #eef4ff; }
    .prediction { font-size: 1.35rem; font-weight: 800; text-transform: capitalize; }
    .metric { margin-top: 8px; }
    .warning { margin-top: 22px; background: #fff4d6; border-left: 4px solid #d89614; padding: 14px; border-radius: 8px; }
    .error { background: #ffecec !important; color: #8e1a1a; }
    code { background: #edf1f7; padding: 2px 5px; border-radius: 5px; }
  </style>
</head>
<body>
<main>
  <section class="card">
    <h1>Thyroid Ultrasound Research Classifier</h1>
    <p class="subtle">ConvNeXt-Tiny, seed 123 · image-level benign/malignant research classification</p>

    <div class="upload">
      <input id="file" type="file" accept="image/jpeg,image/png,image/webp,image/bmp,image/tiff" />
      <button id="run" type="button">Analyse image</button>
    </div>

    <img id="preview" alt="Selected thyroid ultrasound preview" />
    <div id="result" role="status" aria-live="polite"></div>

    <div class="warning">
      <strong>Research use only.</strong> This is not a diagnosis. The external evaluation sensitivity at the locked threshold was about 59%, so malignant cases can be missed.
    </div>
  </section>
</main>
<script>
const input = document.getElementById("file");
const button = document.getElementById("run");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

input.addEventListener("change", () => {
  const file = input.files[0];
  if (!file) return;
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
  result.style.display = "none";
});

button.addEventListener("click", async () => {
  const file = input.files[0];
  if (!file) {
    showError("Select an ultrasound image first.");
    return;
  }

  button.disabled = true;
  button.textContent = "Analysing…";
  result.classList.remove("error");
  result.style.display = "block";
  result.textContent = "Running ConvNeXt-Tiny inference…";

  const body = new FormData();
  body.append("file", file);

  try {
    const response = await fetch("/predict", { method: "POST", body });
    const data = await response.json();
    if (!response.ok) throw new Error(data.detail || "Prediction failed.");

    const raw = (data.malignancy_score_raw * 100).toFixed(1);
    const scaled = (data.malignancy_score_temperature_scaled * 100).toFixed(1);
    result.innerHTML = `
      <div class="prediction">Research classification: ${escapeHtml(data.prediction)}</div>
      <div class="metric">Raw malignancy model score: <strong>${raw}%</strong></div>
      <div class="metric">Temperature-scaled score: <strong>${scaled}%</strong></div>
      <div class="metric">Decision rule: raw score ≥ ${(data.decision_threshold_raw * 100).toFixed(1)}%</div>
      <div class="metric">Model: ${escapeHtml(data.model)} · seed ${data.selected_seed}</div>`;
  } catch (error) {
    showError(error.message);
  } finally {
    button.disabled = false;
    button.textContent = "Analyse image";
  }
});

function showError(message) {
  result.classList.add("error");
  result.style.display = "block";
  result.textContent = `Error: ${message}`;
}

function escapeHtml(value) {
  return String(value).replace(/[&<>'"]/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#039;', '"': '&quot;'
  }[c]));
}
</script>
</body>
</html>
